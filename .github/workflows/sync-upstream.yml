name: Sync Upstream Master

on:
  workflow_dispatch:
    inputs:
      target-branch:
        description: 'Branch to merge upstream/master into'
        required: true
        default: 'calum'
      upstream-url:
        description: 'Upstream repository URL'
        required: true
        default: 'https://github.com/runelite/runelite.git'
      upstream-branch:
        description: 'Upstream branch to merge from'
        required: true
        default: 'master'

jobs:
  sync:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote remove upstream || true
          git remote add upstream '${{ github.event.inputs.upstream-url }}'
          git fetch upstream '${{ github.event.inputs.upstream-branch }}'

      - name: Checkout target branch
        run: |
          git fetch origin '${{ github.event.inputs.target-branch }}'
          git checkout '${{ github.event.inputs.target-branch }}'

      - name: Merge upstream branch
        run: |
          git merge --no-ff --no-edit upstream/${{ github.event.inputs.upstream-branch }}

      - name: Push merged branch
        run: |
          git push origin HEAD:${{ github.event.inputs.target-branch }}
